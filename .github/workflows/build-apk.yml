name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps & Build
        working-directory: ./pindoudraw/client
        run: |
          cd ..
          npx --yes pnpm@9 install --no-frozen-lockfile 2>&1 | tail -5
          cd client
          # Patch the broken Kotlin file in expo-modules-autolinking
          KOTLIN_FILE="node_modules/expo-modules-autolinking/android/expo-gradle-plugin/expo-autolinking-settings-plugin/src/main/kotlin/expo/modules/plugin/SettingsManager.kt"
          if [ -f "" ]; then
            sed -i 's/extensions\./settings./g' ""
            sed -i 's/\.extra/.properties/g' ""
            echo "Patched SettingsManager.kt"
          else
            echo "File not found: "
            find node_modules/expo-modules-autolinking -name "SettingsManager.kt" 2>/dev/null
          fi
          npx --yes eas-cli build --platform android --profile preview --non-interactive 2>&1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./*.apk