name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps & Build
        working-directory: ./pindoudraw/client
        run: |
          cd ..
          npx --yes pnpm@9 install --no-frozen-lockfile 2>&1 | tail -3
          cd client
          npx --yes expo install --fix expo-modules-autolinking 2>&1 | tail -5
          npx --yes eas-cli build --platform android --profile preview --non-interactive 2>&1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./*.apk