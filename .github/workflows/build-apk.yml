name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install global tools
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: |
          cd pindoudraw
          pnpm install --no-frozen-lockfile 2>&1 | tail -15
          # Copy node_modules to android dir so Gradle can find them
          mkdir -p client/android/node_modules
          cp -r node_modules/.pnpm/node_modules/@react-native client/android/node_modules/
          cp -r node_modules/.pnpm/node_modules/react-native client/android/node_modules/
          cp -r node_modules/.pnpm/node_modules/expo client/android/node_modules/ 2>/dev/null || true
          cp -r node_modules/.pnpm/node_modules/expo-modules-autolinking client/android/node_modules/ 2>/dev/null || true
          ls client/android/node_modules/ 2>/dev/null

      - name: Fix gradle mirror
        run: |
          sed -i 's|mirrors.cloud.tencent.com/gradle/gradle|services.gradle.org/distributions/gradle|g' pindoudraw/client/android/gradle/wrapper/gradle-wrapper.properties
          chmod +x pindoudraw/client/android/gradlew

      - name: Build APK
        run: cd pindoudraw/client/android && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: pindoudraw/client/android/app/build/outputs/apk/release/*.apk