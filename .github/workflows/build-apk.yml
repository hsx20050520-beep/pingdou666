name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pindoudraw/client/android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: |
          node --version
          npm init -y 2>&1 | tail -1
          npm install --no-optional --ignore-scripts react-native @react-native/gradle-plugin 2>&1 | tail -5
          echo "--- resolve test ---"
          node -e "console.log('react-native:', require.resolve('react-native/package.json'))" 2>&1 || echo "FAIL: react-native not found"
          node -e "console.log('gradle-plugin:', require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] }))" 2>&1 || echo "FAIL: gradle-plugin not found"

      - name: Fix gradle mirror + grant permission
        run: |
          # Fix gradle mirror URL and path
          sed -i 's|mirrors.cloud.tencent.com/gradle/gradle|services.gradle.org/distributions/gradle|g' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: pindoudraw/client/android/app/build/outputs/apk/release/*.apk
# workflow check
